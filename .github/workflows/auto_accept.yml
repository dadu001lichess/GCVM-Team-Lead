name: Lichess Auto Accept Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Code ophalen uit de repository
      uses: actions/checkout@v4

    - name: Python installeren op de server
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installeer benodigde Python pakketten
      run: |
        pip install requests gspread google-auth

    - name: Start de Lichess Bot
      env:
        LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python bot.py
