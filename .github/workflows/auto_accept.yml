name: Lichess Auto Accept Bot

on:
  schedule:
    - cron: '*/5 * * * *' # Dit zorgt ervoor dat GitHub de bot elke 5 minuten wekt
  workflow_dispatch: # Hiermee kun je de bot ook zelf handmatig wakker maken

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Code ophalen uit de repository
      uses: actions/checkout@v3

    - name: Python installeren op de server
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installeer requests pakket
      run: pip install -r requirements.txt

    - name: Start de Lichess Bot
      env:
        LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      run: python bot.py
